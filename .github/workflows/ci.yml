name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Format, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high || true
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test:run --passWithNoTests

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_TMDB_IMAGE_BASE_URL: https://image.tmdb.org/t/p

      # Bundle size check — fail if first-load JS exceeds 250KB per route
      - name: Check bundle size
        run: |
          echo "=== Bundle Size Report ==="
          # Extract route sizes from Next.js build output
          if [ -f .next/build-manifest.json ]; then
            TOTAL_SIZE=$(du -sb .next/static/chunks | cut -f1)
            TOTAL_KB=$((TOTAL_SIZE / 1024))
            echo "Total chunks: ${TOTAL_KB}KB"
            if [ "$TOTAL_KB" -gt 2048 ]; then
              echo "::warning::Total JS chunks exceed 2MB (${TOTAL_KB}KB)"
            fi
          fi
          echo "Bundle size check complete"
